<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&amp;display=swap');
      
      .gothic-text { 
        font-family: 'UnifrakturMaguntia', serif; 
        text-anchor: middle;
        dominant-baseline: middle;
      }
      
      /* Título Principal */
      .title { 
        fill: #1758AC; 
        font-size: 70px; 
      }
      
      /* Sombra Definida (No difuminada) */
      .shadow-defined {
        fill: #001A33; /* Un azul mucho más oscuro para la sombra sólida */
        font-size: 70px;
      }

      /* Subtítulo */
      .subtitle { 
        fill: #1758AC; 
        font-size: 30px; 
        opacity: 0.7;
      }
    </style>
  </defs>
  
  <rect width="100%" height="100%" fill="transparent" />

  <g transform="translate(400, 90)">
    
    <text class="gothic-text shadow-defined" x="4" y="4">
      Software Engineer
      <animate 
        attributeName="x" 
        values="4; -4; 4" 
        dur="6s" 
        repeatCount="indefinite" />
      <animate 
        attributeName="y" 
        values="4; -2; 4" 
        dur="6s" 
        repeatCount="indefinite" />
    </text>
    
    <text class="gothic-text title" x="0" y="0">Software Engineer</text>
    
    <text class="gothic-text title" x="0" y="0" fill="#FF0000" opacity="0">
      Software Engineer
      <animate 
        attributeName="opacity" 
        values="0; 0; 0.6; 0; 0; 0.8; 0" 
        dur="10s" 
        repeatCount="indefinite" />
      <animateTransform 
        attributeName="transform" 
        type="translate" 
        values="0,0; 2,1; -2,-1; 0,0" 
        dur="10s" 
        repeatCount="indefinite" />
    </text>
  </g>

  <text x="50%" y="150" class="gothic-text subtitle">Digital Alchemist &amp; Backend Dev</text>
  
  <path d="M 100 170 H 700" stroke="#1758AC" stroke-width="1" fill="none" stroke-dasharray="600">
    <animate 
      attributeName="stroke-dashoffset" 
      from="600" 
      to="0" 
      dur="3s" 
      repeatCount="indefinite" />
  </path>
</svg>
